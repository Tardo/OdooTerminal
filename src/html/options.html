<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OdooTerminal Options</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 84px;
      }

      html,
      body,
      #app {
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: #f0f2f5;
        color: rgba(0, 0, 0, 0.85);
        font-size: 14px;
      }

      .options-app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Header — clean flat */
      .options-header {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #f0f0f0;
        box-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(22, 119, 255, 0.35);
      }

      .brand-icon-text {
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      }

      .brand-text {
        line-height: 1.2;
      }

      .brand-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.2px;
      }

      .brand-subtitle {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.45);
        margin: 2px 0 0 0;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Body: sticky anchor sidebar + scrollable main */
      .options-body {
        flex: 1;
        display: flex;
        align-items: flex-start;
      }

      .options-sidenav {
        position: sticky;
        top: 64px;
        width: 224px;
        flex-shrink: 0;
        height: calc(100vh - 64px);
        overflow-y: auto;
        padding: 24px 12px;
        background: #fff;
        border-right: 1px solid #f0f0f0;
      }

      .options-main {
        flex: 1;
        padding: 24px;
        min-width: 0;
      }

      /* Sections */
      .ot-section {
        margin-bottom: 20px;
        scroll-margin-top: 84px;
      }

      .ot-card.ant-card {
        border-radius: 8px;
      }

      .ot-card .ant-card-head-title {
        font-weight: 600;
      }

      /* Hints */
      .ot-hint {
        color: rgba(0, 0, 0, 0.55);
        margin-bottom: 12px;
      }

      .ot-warn {
        color: #d48806;
        font-size: 13px;
        margin-bottom: 12px;
      }

      .ot-tip {
        color: rgba(0, 0, 0, 0.45);
        font-size: 13px;
        margin: 0 0 8px 0;
      }

      /* Switch / checkbox rows */
      .ot-switch-line {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .ot-switch-label {
        color: rgba(0, 0, 0, 0.65);
      }

      .ot-check-stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Native color input */
      .ot-color-input {
        width: 36px;
        height: 36px;
        padding: 0;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }

      .ot-color-input::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .ot-color-input::-webkit-color-swatch {
        border: none;
        border-radius: 4px;
      }

      .ot-color-input::-moz-color-swatch {
        border: none;
        border-radius: 4px;
      }

      .ot-color-cell {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ot-color-swatch {
        display: inline-block;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        border: 1px solid #d9d9d9;
      }

      /* Buttons row + status + tags */
      .ot-btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .ot-status {
        font-size: 13px;
        margin-top: 8px;
      }

      .ot-status-green {
        color: #52c41a;
      }

      .ot-status-orange {
        color: #fa8c16;
      }

      .ot-status-red {
        color: #f5222d;
      }

      .ot-tag-list {
        margin-bottom: 16px;
      }

      .ot-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      /* Loading overlay */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(2px);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .options-header {
          padding: 0 12px;
          height: auto;
          min-height: 56px;
          flex-wrap: wrap;
          gap: 8px;
          padding-top: 8px;
          padding-bottom: 8px;
        }

        .brand-subtitle {
          display: none;
        }

        .options-body {
          flex-direction: column;
        }

        .options-sidenav {
          display: none;
        }

        .options-main {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/dist/priv/app.mjs" type="module"></script>
  </body>
</html>
